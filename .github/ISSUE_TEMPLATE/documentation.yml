name: Documentation change
description: Request a documentation update or correction.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: change
    attributes:
      label: Requested change
      description: What should be updated?
      placeholder: Describe the documentation gap or correction.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links or examples if relevant.
    validations:
      required: false
